<!DOCTYPE html>
<html>
<head>
    <title>Map Analyzer</title>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="results"></div>
    <script>
        const img = new Image();
        img.src = 'file:///c:/landingpage/landingPage/src/assets/Map.png';
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const dots = [];

            // Look for blue pixels (around 3b44f6 -> rgb(59, 68, 246))
            // Blue range: R < 100, G < 150, B > 150
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const index = (y * canvas.width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];

                    if (r < 100 && g < 150 && b > 180) {
                        // Check if this pixel is part of an existing dot
                        let found = false;
                        for (const dot of dots) {
                            const dx = x - dot.avgX;
                            const dy = y - dot.avgY;
                            if (Math.sqrt(dx*dx + dy*dy) < 15) {
                                dot.points.push({x, y});
                                dot.avgX = dot.points.reduce((sum, p) => sum + p.x, 0) / dot.points.length;
                                dot.avgY = dot.points.reduce((sum, p) => sum + p.y, 0) / dot.points.length;
                                found = true;
                                break;
                            }
                        }
                        if (!found) {
                            dots.push({ points: [{x, y}], avgX: x, avgY: y });
                        }
                    }
                }
            }

            const finalDots = dots.filter(d => d.points.length > 5).map(d => ({
                x: d.avgX,
                y: d.avgY,
                px: (d.avgX / canvas.width * 100).toFixed(2) + '%',
                py: (d.avgY / canvas.height * 100).toFixed(2) + '%'
            }));

            document.getElementById('results').innerText = JSON.stringify(finalDots, null, 2);
            console.log('DOTS_DETECTED:', finalDots);
        };
    </script>
</body>
</html>
