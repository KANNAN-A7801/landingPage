# =============================================
# Garuda Career Contact Form Backend
# =============================================

# Server port
server.port=${PORT:8080}

# =============================================
# RESEND EMAIL API (HTTPS - works on Render)
# =============================================
# Set RESEND_API_KEY as environment variable in Render dashboard
resend.api.key=${RESEND_API_KEY:re_placeholder_set_in_render}

# =============================================
# CUSTOM EMAIL SETTINGS
# =============================================
# The "from" address shown in emails
# Use "Garuda Career <onboarding@resend.dev>" for free Resend testing
# (can only send to verified email addresses in test mode)
# After verifying your domain in Resend, change to: "Garuda Career <no-reply@yourdomain.com>"
mail.sender.from=Garuda Career <onboarding@resend.dev>

# The admin email that receives all contact form submissions
mail.admin.email=foujs14@gmail.com

# =============================================
# LOGGING
# =============================================
logging.level.com.engloray=INFO
